name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Go: vet, lint, test, build
  # ──────────────────────────────────────────────
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go mod verify
        run: go mod verify

      - name: Go fmt check
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Go vet
        run: go vet ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

      - name: Go test
        run: go test -race -coverprofile=cover.out -covermode=atomic ./... 2>&1 | tee test.out

      - name: Enforce coverage (85% minimum per package)
        run: ./scripts/check-coverage.sh 85 test.out

      - name: Go build
        run: go build -o /dev/null ./cmd/kflashback/

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: cover.out

  # ──────────────────────────────────────────────
  # Integration tests (only on push to main)
  # ──────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [go]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        run: go test -race -tags=integration -v ./...

  # ──────────────────────────────────────────────
  # UI: lint, type-check, build
  # ──────────────────────────────────────────────
  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (includes tsc type check)
        run: npm run build

  # ──────────────────────────────────────────────
  # Docker: build image (no push on PRs)
  # ──────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [go, ui]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/prashanthjos/kflashback:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Manifests: validate YAML and CRDs
  # ──────────────────────────────────────────────
  manifests:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kubeval --strict --ignore-missing-schemas \
            config/manager/deployment.yaml \
            config/rbac/role.yaml \
            config/rbac/role_binding.yaml \
            config/rbac/service_account.yaml \
            config/samples/sample-config.yaml \
            config/samples/sample-config-postgres.yaml \
            config/samples/sample-policy.yaml

  # ─────────────────────────────────────────────────────
  # E2E Test Suite: Runs E2E Test for SQLite and Postgres
  # ─────────────────────────────────────────────────────

  sqlite_e2e_test:
    name: SQLite E2E Test setup
    runs-on:  ubuntu-latest
    needs: [go, integration, ui, docker, manifests]
    env:
      STORAGE_BACKEND:  "sqlite"

    steps:
      - uses: actions/checkout@v4
      
      - name: Pull KinD Node image
        run:  docker pull kindest/node@sha256:c48c62eac5da28cdadcf560d1d8616cfa6783b58f0d94cf63ad1bf49600cb027

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      
      - name: Run SQLite E2E Test
        working-directory:  ./test
        run:  go test -race -tags=e2e -v ./...
      
      - name: Cleanup Resources
        run:  |
          docker stop $(docker ps -q)
          docker rm $(docker ps -q)
          docker system prune --volumes -af

  postgres_e2e_test:
    name: Postgresql E2E Test setup
    runs-on:  ubuntu-latest
    needs: [go, integration, ui, docker, manifests]
    env:
      STORAGE_BACKEND:  "postgresql"

    steps:
      - uses: actions/checkout@v4

      - name: Pull KinD Node image
        run:  docker pull kindest/node@sha256:c48c62eac5da28cdadcf560d1d8616cfa6783b58f0d94cf63ad1bf49600cb027

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false      
      - name: Run Postgresql E2E Test
        working-directory:  ./test
        run:  go test -race -tags=e2e -v ./...
      
      - name: Cleanup Resources
        run:  |
          docker stop $(docker ps -q)
          docker rm $(docker ps -q)
          docker system prune --volumes -af
